# /etc/nginx/sites-available/cyberstefan.nl

# Upstream voor de editor/learning app (LAN)
upstream editor {
    server 192.168.2.112:8082;
}

server {
    listen 80;
    listen [::]:80;
    server_name cyberstefan.nl www.cyberstefan.nl;
    return 301 https://cyberstefan.nl$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cyberstefan.nl www.cyberstefan.nl;

    ssl_certificate     /etc/ssl/cyberstefan/cert.pem;
    ssl_certificate_key /etc/ssl/cyberstefan/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;

    root /home/stefan/ctf-workflow/web;
    index index.html;

    # ── Editor/learning proxy helpers ──────────────────────────────────────────
    # Gedeeld proxy-blok via map — editor routes gaan naar 192.168.2.112:8082
    # Volgorde: langere/specifieke locaties eerst (nginx longest-prefix matching)

    # WebSocket terminal
    location /ws/terminal {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Editor API routes (overschrijven de generieke /api/ hieronder)
    location /api/cards {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/progress {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Hoofd CTF API (poort 8000)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Auth, login, logout → editor
    location /login {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /logout {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # AI endpoints → editor
    location /hint {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /analyze {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }


    location /submit {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # VPN beheer (alleen via geauthenticeerde sessie) → editor
    location /vpn/ {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 5m;
    }

    # Learn/learning pagina's → editor
    location /learn {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /learning {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # PWA assets → editor
    location /manifest.json {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    location /sw.js {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    location /icon.png {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    # Upload bestanden → editor
    location /ctf-uploads/ {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /upload/ {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    # Downloads → editor (API routes eerst, daarna static proxy)
    location /downloads/list {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_intercept_errors on;
        error_page 502 503 504 = @downloads_offline;
    }
    location @downloads_offline {
        default_type application/json;
        return 503 '{"detail":"Backend niet bereikbaar"}';
    }

    location /downloads/clear {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    location /downloads/ {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Content-Disposition "attachment";
    }

    # Terminal HTTP long-polling → editor
    location /terminal/ {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        add_header         Cache-Control "no-cache" always;
    }

    # Writeups → editor
    location /writeups {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Portfolio → editor
    location /profile {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Publiek portfolio (geen auth vereist)
    location /p {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /public/ {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /htb/ {
        proxy_pass         http://editor;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # ── Publieke CTF site ──────────────────────────────────────────────────────
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/writeup/[0-9]+$ {
        try_files /writeup.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
