<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cyberstefan.nl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<!-- ── Language selector overlay ─────────────────────────────────────────────── -->
<div id="lang-overlay" class="lang-overlay">
  <div class="lang-selector-box">
    <div class="lang-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="m8 21 4-4 4 4"/><path d="M7 7h.01"/><path d="M11 7h6"/><path d="M7 11h.01"/><path d="M11 11h6"/>
      </svg>
    </div>
    <h1 class="lang-site-title">cyberstefan.nl</h1>
    <p class="lang-subtitle">CTF Writeups &amp; Security Research</p>
    <div class="lang-options">
      <button class="lang-option-btn" data-lang="nl" title="Nederlands">
        <svg class="flag-svg" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
          <rect width="900" height="600" fill="#21468B"/>
          <rect width="900" height="400" fill="#fff"/>
          <rect width="900" height="200" fill="#AE1C28"/>
        </svg>
        <span class="lang-code">NL</span>
      </button>
      <button class="lang-option-btn" data-lang="en" title="English">
        <svg class="flag-svg" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
          <rect width="60" height="30" fill="#012169"/>
          <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
          <path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4"/>
          <path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/>
          <path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/>
        </svg>
        <span class="lang-code">EN</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Main site ──────────────────────────────────────────────────────────────── -->
<div id="site" class="hidden">

<header>
  <div class="container header-inner">
    <div style="display:flex;align-items:center;gap:20px">
      <div class="social-links">
        <a href="https://www.linkedin.com/in/cyber-stefan-094572400/" target="_blank" rel="noopener" class="social-icon" title="LinkedIn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
        <a href="https://www.instagram.com/cyberstefan.nl/" target="_blank" rel="noopener" class="social-icon" title="Instagram">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
        </a>
        <a href="https://www.tiktok.com/@cyberstefan.nl" target="_blank" rel="noopener" class="social-icon" title="TikTok">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>
        </a>
      </div>
      <a href="/" class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="m8 21 4-4 4 4"/><path d="M7 7h.01"/><path d="M11 7h6"/><path d="M7 11h.01"/><path d="M11 11h6"/>
        </svg>
        CTF Writeups
      </a>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <a href="/learning" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Learning
      </a>
      <span class="header-meta" id="header-count"></span>
      <div class="lang-flags-header">
        <button class="lang-flag-btn" data-lang="nl" title="Nederlands">
          <svg class="flag-svg-sm" viewBox="0 0 900 600">
            <rect width="900" height="600" fill="#21468B"/>
            <rect width="900" height="400" fill="#fff"/>
            <rect width="900" height="200" fill="#AE1C28"/>
          </svg>
          <span class="lang-switch-code">NL</span>
        </button>
        <button class="lang-flag-btn" data-lang="en" title="English">
          <svg class="flag-svg-sm" viewBox="0 0 60 30">
            <rect width="60" height="30" fill="#012169"/>
            <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
            <path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4"/>
            <path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/>
            <path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/>
          </svg>
          <span class="lang-switch-code">EN</span>
        </button>
      </div>
    </div>
  </div>
</header>

<main class="container">
  <div class="hero">
    <h1 id="hero-title">Machine Writeups</h1>
    <p id="hero-desc"></p>
  </div>

  <div class="stats-bar" id="stats"></div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all"    id="filter-all">All</button>
    <button class="filter-btn"        data-filter="HackTheBox">HackTheBox</button>
    <button class="filter-btn"        data-filter="TryHackMe">TryHackMe</button>
    <button class="filter-btn"        data-filter="Easy"   id="filter-easy">Easy</button>
    <button class="filter-btn"        data-filter="Medium" id="filter-medium">Medium</button>
    <button class="filter-btn"        data-filter="Hard"   id="filter-hard">Hard</button>
    <button class="filter-btn"        data-filter="Insane">Insane</button>
  </div>

  <div id="root">
    <div class="loading">
      <div class="spinner"></div>
      <span id="loading-text">Loading...</span>
    </div>
  </div>
</main>

<footer>
  <div class="container" id="footer-text"></div>
</footer>

</div><!-- /#site -->

<script>
const API = '/api/writeups';

// ── Flag SVG snippets ─────────────────────────────────────────────────────────
const FLAGS = {
  nl: {
    viewBox: '0 0 900 600',
    inner: '<rect width="900" height="600" fill="#21468B"/><rect width="900" height="400" fill="#fff"/><rect width="900" height="200" fill="#AE1C28"/>',
    code: 'NL'
  },
  en: {
    viewBox: '0 0 60 30',
    inner: '<rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/>',
    code: 'EN'
  }
};

// ── Translations ──────────────────────────────────────────────────────────────
const T = {
  en: {
    hero_title:    'Machine Writeups',
    hero_desc:     'HackTheBox &amp; TryHackMe — structured writeups documenting recon, exploitation, and privilege escalation.',
    filter_all:    'All',
    filter_easy:   'Easy',
    filter_medium: 'Medium',
    filter_hard:   'Hard',
    stat_machines: 'Machines',
    stat_tech:     'Techniques',
    loading:       'Loading writeups...',
    empty:         'No writeups yet. Run <code>ctf-writeup</code> after your next session.',
    error:         'Failed to load writeups',
    footer:        'Built with FastAPI &amp; SQLite &mdash; automated via <code>ctf-writeup</code> CLI',
    switch_lang:   'nl',
    date: d => new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }),
    count: n => `${n} machine${n !== 1 ? 's' : ''}`,
  },
  nl: {
    hero_title:    'Machine Writeups',
    hero_desc:     'HackTheBox &amp; TryHackMe — gestructureerde writeups over verkenning, exploitatie en privilege escalation.',
    filter_all:    'Alles',
    filter_easy:   'Makkelijk',
    filter_medium: 'Gemiddeld',
    filter_hard:   'Moeilijk',
    stat_machines: 'Machines',
    stat_tech:     'Technieken',
    loading:       'Writeups laden...',
    empty:         'Nog geen writeups. Voer <code>ctf-writeup</code> uit na je volgende sessie.',
    error:         'Laden mislukt',
    footer:        'Gebouwd met FastAPI &amp; SQLite &mdash; geautomatiseerd via <code>ctf-writeup</code> CLI',
    switch_lang:   'en',
    date: d => new Date(d).toLocaleDateString('nl-NL', { year:'numeric', month:'short', day:'numeric' }),
    count: n => `${n} machine${n !== 1 ? 's' : ''}`,
  }
};

// ── State ─────────────────────────────────────────────────────────────────────
let lang        = localStorage.getItem('lang');
let allWriteups = [];
let activeFilter = 'all';

// ── Language helpers ──────────────────────────────────────────────────────────
function setFlagBtn(svgEl, codeEl, flagKey) {
  const f = FLAGS[flagKey];
  svgEl.setAttribute('viewBox', f.viewBox);
  svgEl.innerHTML = f.inner;
  if (codeEl) codeEl.textContent = f.code;
}

function applyLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.getElementById('html-root').lang = l;
  const t = T[l];
  document.getElementById('hero-title').textContent    = t.hero_title;
  document.getElementById('hero-desc').innerHTML       = t.hero_desc;
  document.getElementById('filter-all').textContent    = t.filter_all;
  document.getElementById('filter-easy').textContent   = t.filter_easy;
  document.getElementById('filter-medium').textContent = t.filter_medium;
  document.getElementById('filter-hard').textContent   = t.filter_hard;
  document.getElementById('loading-text').textContent  = t.loading;
  document.getElementById('footer-text').innerHTML     = t.footer;

  // Mark active flag button
  document.querySelectorAll('.lang-flag-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === l);
  });

  if (allWriteups.length) {
    renderStats();
    renderCards(allWriteups.filter(w =>
      activeFilter === 'all' || w.platform === activeFilter || w.difficulty === activeFilter));
    document.getElementById('header-count').textContent = t.count(allWriteups.length);
  }
}

function showSite(l) {
  document.getElementById('lang-overlay').classList.add('hidden');
  document.getElementById('site').classList.remove('hidden');
  applyLang(l);
  if (!allWriteups.length) load();
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.querySelectorAll('.lang-option-btn').forEach(btn => {
  btn.addEventListener('click', () => showSite(btn.dataset.lang));
});

document.querySelectorAll('.lang-flag-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  const filtered = activeFilter === 'all'
    ? allWriteups
    : allWriteups.filter(w => w.platform === activeFilter || w.difficulty === activeFilter);
  renderCards(filtered);
});

// ── Init ──────────────────────────────────────────────────────────────────────
if (lang) {
  showSite(lang);
} else {
  document.getElementById('lang-overlay').classList.remove('hidden');
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allWriteups = await res.json();
    renderStats();
    renderCards(allWriteups);
    document.getElementById('header-count').textContent = T[lang].count(allWriteups.length);
  } catch (e) {
    document.getElementById('root').innerHTML =
      `<div class="error-msg">${T[lang].error}: ${e.message}</div>`;
  }
}

function renderStats() {
  const t = T[lang];
  const byDiff = {};
  const tagSet = new Set();
  for (const w of allWriteups) {
    byDiff[w.difficulty] = (byDiff[w.difficulty] || 0) + 1;
    (w.tags || []).forEach(tag => tagSet.add(tag));
  }
  document.getElementById('stats').innerHTML = [
    stat(allWriteups.length,     t.stat_machines),
    stat(byDiff['Easy']   || 0, 'Easy',   '--green'),
    stat(byDiff['Medium'] || 0, 'Medium', '--yellow'),
    stat(byDiff['Hard']   || 0, 'Hard',   '--red'),
    stat(tagSet.size,            t.stat_tech),
  ].join('');
}

function stat(value, label, color = '') {
  const style = color ? `style="color:var(${color})"` : '';
  return `<div class="stat"><span class="stat-value" ${style}>${value}</span><span class="stat-label">${label}</span></div>`;
}

function renderCards(writeups) {
  const root = document.getElementById('root');
  if (!writeups.length) {
    root.innerHTML = `
      <div class="cards">
        <div class="empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414A1 1 0 0 1 19 9.414V19a2 2 0 0 1-2 2z"/>
          </svg>
          <p>${T[lang].empty}</p>
        </div>
      </div>`;
    return;
  }
  root.innerHTML = `<div class="cards">${writeups.map(card).join('')}</div>`;
}

function card(w) {
  const tags = (w.tags || []).slice(0, 4).map(t =>
    `<span class="badge badge-tag">${esc(t)}</span>`).join('');
  const more = w.tags && w.tags.length > 4
    ? `<span class="badge badge-tag">+${w.tags.length - 4}</span>` : '';
  return `
    <a class="card" href="/writeup/${w.id}">
      <div class="card-header">
        <span class="card-title">${esc(w.machine)}</span>
      </div>
      <div class="card-meta">
        <span class="badge badge-difficulty-${w.difficulty}">${w.difficulty}</span>
        <span class="badge badge-platform-${w.platform}">${w.platform}</span>
      </div>
      ${tags || more ? `<div class="card-tags">${tags}${more}</div>` : ''}
      <span class="card-date">${T[lang].date(w.created_at)}</span>
    </a>`;
}

function esc(str) {
  return String(str).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
</script>
</body>
</html>
